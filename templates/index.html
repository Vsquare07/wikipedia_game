<!doctype html>
<html lang="en">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Wikifinder</title>
    <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Orbitron:wght@400;700;900&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="static/index_css.css">
</head>

<body>

    <div class="blob blob-1"></div>
    <div class="blob blob-2"></div>
    <div class="blob blob-3"></div>

    <nav>
        <span class="nav-brand"><a href="/" class="active">Wikifinder</a></span>
    </nav>

    <main>
        <div class="card">
            <div class="card-inner">
                <div class="dots">
                    <span></span><span></span><span></span>
                </div>
                <h1 class="card-title">Wikifinder</h1>
                <p class="card-subtitle">Navigate the knowledge graph</p>
                <hr>

                <form action="/process" method="POST">
                    <div class="field">
                        <label for="start_word_input">Starting node</label>
                        <div class="input-wrap">
                            <input type="text" id="start_word_input" name="start_word_input"
                                placeholder="e.g. Elephant">
                            <div class="glow-line"></div>
                        </div>
                    </div>
                    <div class="field">
                        <label for="end_word_input">Target node</label>
                        <div class="input-wrap">
                            <input type="text" id="end_word_input" name="end_word_input"
                                placeholder="e.g. Quantum Physics">
                            <div class="glow-line"></div>
                        </div>
                    </div>
                    <button class="btn-go" type="submit">
                        <div class="btn-go-inner">Execute Search ▶</div>
                    </button>
                </form>
            </div>
        </div>
    </main>

</body>

</html>
