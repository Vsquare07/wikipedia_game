<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wikifinder — Results</title>
    <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Orbitron:wght@400;700;900&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="static/result_css.css">
</head>

<body>

    <div class="bg-grid"></div>
    <div class="blob blob-1"></div>
    <div class="blob blob-2"></div>
    <nav>
        <span class="nav-brand"><a href="/" class="active">Wikifinder</a></span>
    </nav>

    <div class="page">

        <div class="header-panel">
            <h2 class="page-title">Path Results</h2>
            <div class="meta-row">
                <div class="meta-item">
                    <span class="meta-label">Origin</span>
                    <span class="meta-value">{{ start_word }}</span>
                </div>
                <div class="meta-item">
                    <span class="meta-label">Target</span>
                    <span class="meta-value">{{ end_word }}</span>
                </div>
            </div>
            <div class="action-row">
                <button class="btn btn-stop" onclick="stopStream()">⬛ Stop Stream</button>
                <form action="/restart" method="POST" style="display:inline;">
                    <button type="submit" class="btn btn-restart">↺ New Search</button>
                </form>
            </div>
        </div>

        <div id="container">
            <div class="skeleton-wrap">
                <div class="skel"></div>
                <div class="skel" style="height:56px;opacity:0.7;animation-delay:0.15s"></div>
                <div class="skel" style="height:56px;opacity:0.4;animation-delay:0.3s"></div>
            </div>
        </div>
    </div>

    <script>
        const container = document.getElementById("container");
        let eventSource = new EventSource(`/stream`);
        let count = 1;

        // Remove skeleton once first real block arrives
        let skeletonRemoved = false;
        function removeSkeleton() {
            if (!skeletonRemoved) {
                const sk = container.querySelector('.skeleton-wrap');
                if (sk) sk.remove();
                skeletonRemoved = true;
            }
        }

        eventSource.onmessage = function (event) {
            const data = JSON.parse(event.data);
            let word = data.word;
            let url = data.url;
            if (!word && !url) return;

            removeSkeleton();

            const div = document.createElement("div");
            div.className = "block";

            if (word === "__found__") {
                div.classList.add("block-found");
                div.innerHTML = `<p class="status-text">✅ TARGET REACHED — Path complete</p>`;
                stopStream();
            } else if (word === "__NOTfound__") {
                div.classList.add("block-notfound");
                div.innerHTML = `<p class="status-text">✖ NOT FOUND — Limit of 20 steps exceeded</p>`;
                stopStream();
            } else {
                div.innerHTML = `
                    <span class="block-num">${String(count).padStart(2, '0')}</span>
                    <p class="block-word">${word}</p>
                    <p class="block-url"><a href="${url}" target="_blank">${url}</a></p>
                `;
                count++;
            }

            // Stagger animation delay per block
            div.style.animationDelay = `${Math.min((count - 1) * 0.04, 0.3)}s`;
            container.appendChild(div);
            window.scrollTo({ top: document.body.scrollHeight, behavior: 'smooth' });
        };

        eventSource.onerror = function (err) {
            console.error("SSE error:", err);
            stopStream();
        };

        function stopStream() {
            if (eventSource) { eventSource.close(); eventSource = null; }
            removeSkeleton();
            const div = document.createElement("div");
            div.className = "block";
            div.classList.add("block-stopped");
            div.innerHTML = `<p class="status-text">🟨Search stopped</p>`;
            container.appendChild(div);
        }
    </script>

</body>

</html>
