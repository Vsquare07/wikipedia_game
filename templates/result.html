<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wikifinder</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-T3c6CoIi6uLrA9TneNEoa7RxnatzjcDSCmG1MXxSR1GAsXEV/Dwwykc2MPK8M2HN" crossorigin="anonymous">

    <style>
        /* Updated your custom block to look a bit more modern using Bootstrap-like colors */
        .block {
            border: 1px solid #dee2e6;
            border-radius: 0.375rem;
            margin: 15px 0;
            padding: 15px;
            background-color: #f8f9fa;
        }
    </style>
</head>

<body>

    <div class="container mt-4">
        <h2>Wikifinder</h2>

        <p><b>Start:</b> {{ start_word }}</p>
        <p><b>End:</b> {{ end_word }}</p>

        <button class="btn btn-danger" onclick="stopStream()">Stop</button>
        <form action="/restart" method="POST" style="display:inline;">
            <button type="submit" class="btn btn-primary">Restart</button>
        </form>

        <hr class="my-4">

        <div id="container"></div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-C6RzsynM9kWDrMNeT87bh95OGNyZPhcTNXj1NW7RuBCsyN/o0jlpcV8Qyq46cDfL"
        crossorigin="anonymous"></script>

    <script>
        const container = document.getElementById("container");

        const skeletonDiv = document.createElement('div');
        skeletonDiv.innerHTML = `
            <p class="placeholder-glow">
                <span class="placeholder col-12 bg-secondary">&nbsp;</span>
            </p>
            <p class="placeholder-wave">
                <span class="placeholder col-12 bg-secondary">&nbsp;</span>
            </p>
        `;
        container.appendChild(skeletonDiv);

        let eventSource = new EventSource(`/stream`);
        let count = 1;

        eventSource.onmessage = function(event){
            const data = JSON.parse(event.data);
            let word = data.word;
            let url = data.url;

            if(word && url){
                const div = document.createElement("div");
                div.className = "block";

                let isFinished = false;

                if(word == "__found__"){
                    div.innerHTML = `<p class="mb-0 text-success"><b>Target word found ✅</b></p>`;
                    isFinished = true;
                }
                else if(word == "__NOTfound__"){
                    div.innerHTML = `<p class="mb-0 text-danger"><b>Target word not found in the limit of 20 steps ❌</b></p>`;
                    isFinished = true;
                }
                else {
                    div.innerHTML = `
                        <p class="mb-1 fw-bold">${count}: ${word}</p>
                        <p class="mb-0"><a href="${url}" target="_blank" class="text-decoration-none">${url}</a></p>
                    `;
                }

                container.insertBefore(div, skeletonDiv);
                count += 1;

                if(isFinished){
                    stopStream();
                }
            }

            window.scrollTo(0, document.body.scrollHeight);
        };

        eventSource.onerror = function(err){
            console.error("SSE error:", err);
            stopStream();
        };

        function stopStream(){
            if(eventSource){
                eventSource.close();
            }
            if(skeletonDiv.parentNode){
                skeletonDiv.remove();
            }
        }
    </script>

</body>

</html>
